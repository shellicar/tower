# The canonical broker for the conv/approval wire — one file, used verbatim by
# every repo that needs the deployment (tower, claude-cli). JetStream (`-js`)
# retains events with no live subscriber ("record now, analyse later");
# `-m 8222` exposes monitoring.
services:
  nats:
    image: nats:latest
    # `-sd /data` points JetStream at the mounted volume — without it the
    # store defaults to /tmp inside the container and the volume is decorative.
    command: ['-js', '-sd', '/data', '-m', '8222']
    # The broker outlives incidents: restart on crash or daemon restart, stay
    # down only when deliberately stopped. stream-init has no policy on
    # purpose — it is a one-shot that must be allowed to exit.
    restart: unless-stopped
    ports:
      - '4222:4222'
      - '8222:8222'
    volumes:
      - nats-data:/data

  # One-shot: converge every capture stream (conv-approval / conv-diagnostic /
  # conv-ephemeral) to mvp/crates/towerd/src/ingest.rs's declared subject
  # split — create what's missing, migrate any subject sitting on the wrong
  # stream (verified, no-loss), edit retention to match. Runs on every `up`;
  # `down` never removes the data volume, so this script is the ONLY thing
  # that ever needs to bring an existing broker's streams up to date — there
  # is no separate migrate-*.sh to run by hand (mvp/stream-init.sh has the
  # full reasoning). Event subjects only — never a `.requests` subject: a
  # JetStream stream over a request subject answers the request with its own
  # PubAck, beating the servicer's reply (nats-spec, Storage).
  stream-init:
    image: natsio/nats-box:latest
    depends_on:
      - nats
    volumes:
      - ./stream-init.sh:/stream-init.sh:ro
    entrypoint:
      - sh
      - /stream-init.sh

volumes:
  nats-data:
