# `trunk serve` hosts the wasm app on :8080 and proxies the socket + ref fetches
# through to towerd (127.0.0.1:8081, its dev bind), the same seam vite gives the
# Svelte app. So the page's ws://localhost:8080/ws reaches towerd unchanged.

[[proxy]]
backend = "ws://127.0.0.1:8081/ws"
ws = true

[[proxy]]
backend = "http://127.0.0.1:8081/ref"
