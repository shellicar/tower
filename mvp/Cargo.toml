[workspace]
resolver = "2"
members = ["crates/wire", "crates/towerd"]

[workspace.package]
version = "0.1.0"
edition = "2024"

# Shared dependencies live here once; crates inherit with `foo.workspace = true`.
[workspace.dependencies]
anyhow = "1"
async-nats = "0.49"
axum = { version = "0.8", features = ["ws"] }
futures = "0.3"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
